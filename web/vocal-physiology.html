<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>声乐问题 × 生理机理 — Vibesing 高音觉醒</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#050508;--card:rgba(255,255,255,0.025);
  --glass:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.06);
  --cyan:#00e5ff;--pink:#ff2d78;--purple:#b44aff;
  --green:#00ff88;--yellow:#ffd700;--orange:#ff8a3d;--red:#ff3b5c;
  --text:#e4e4f0;--dim:#5e5e74;
}
html{font-size:16px;scroll-behavior:smooth}
body{
  font-family:'SF Pro Display',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg);color:var(--text);overflow-x:hidden;
}

/* ===== AURORA BG ===== */
.aurora{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 90% 50% at 10% 20%,rgba(0,229,255,0.06),transparent),
    radial-gradient(ellipse 70% 60% at 90% 80%,rgba(180,74,255,0.05),transparent),
    radial-gradient(ellipse 80% 40% at 50% 50%,rgba(255,45,120,0.03),transparent);
  animation:hueShift 20s ease-in-out infinite alternate;
}
@keyframes hueShift{0%{filter:hue-rotate(0deg)}100%{filter:hue-rotate(20deg)}}

/* ===== CONTAINER ===== */
.container{position:relative;z-index:1;max-width:1300px;margin:0 auto;padding:0 24px}

/* ===== HERO ===== */
.hero{
  padding:100px 0 60px;text-align:center;
}
.hero-tag{
  display:inline-block;
  padding:6px 18px;border-radius:50px;font-size:0.72rem;
  letter-spacing:2px;text-transform:uppercase;
  border:1px solid rgba(0,229,255,0.2);color:var(--cyan);
  background:rgba(0,229,255,0.06);margin-bottom:24px;
}
.hero h1{
  font-size:clamp(2.5rem,6vw,4.2rem);font-weight:800;
  line-height:1.15;margin-bottom:16px;
  background:linear-gradient(135deg,#fff 20%,var(--cyan) 60%,var(--purple) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.hero p{
  max-width:680px;margin:0 auto;color:var(--dim);font-size:1.05rem;line-height:1.7;
}

/* ===== LARYNX SVG DIAGRAM ===== */
.anatomy-section{
  padding:60px 0;display:flex;justify-content:center;
}
.larynx-diagram{
  width:100%;max-width:800px;position:relative;
}
.larynx-svg{width:100%;height:auto}

/* ===== CATEGORY NAV ===== */
.cat-nav{
  display:flex;justify-content:center;gap:8px;flex-wrap:wrap;
  padding:20px 0 40px;position:sticky;top:0;z-index:50;
  background:linear-gradient(180deg,var(--bg) 60%,transparent);
  padding-top:16px;
}
.cat-btn{
  padding:8px 18px;border:1px solid var(--border);
  border-radius:50px;background:var(--glass);
  color:var(--dim);font-size:0.78rem;font-weight:600;
  cursor:pointer;transition:all 0.3s;letter-spacing:0.5px;
  white-space:nowrap;
}
.cat-btn:hover,.cat-btn.active{
  border-color:var(--cyan);color:var(--cyan);
  background:rgba(0,229,255,0.08);
  box-shadow:0 0 16px rgba(0,229,255,0.1);
}

/* ===== PROBLEM CARDS ===== */
.problems-grid{
  display:grid;grid-template-columns:1fr;gap:24px;
  padding-bottom:80px;
}
.problem-card{
  display:grid;grid-template-columns:360px 1fr;
  background:var(--card);border:1px solid var(--border);
  border-radius:24px;overflow:hidden;
  transition:all 0.4s cubic-bezier(0.16,1,0.3,1);
  position:relative;
}
.problem-card:hover{
  transform:translateY(-4px);
  border-color:rgba(255,255,255,0.1);
  box-shadow:0 20px 60px rgba(0,0,0,0.4);
}
.problem-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.08),transparent);
}

/* Left: Anatomy illustration */
.card-anatomy{
  padding:32px;display:flex;flex-direction:column;
  justify-content:center;align-items:center;
  position:relative;overflow:hidden;
  border-right:1px solid var(--border);
}
.card-anatomy::before{
  content:'';position:absolute;inset:0;
  opacity:0.06;
}

/* Anatomy SVG inline */
.anatomy-visual{
  width:200px;height:200px;position:relative;
  margin-bottom:16px;
}
.anatomy-visual svg{width:100%;height:100%}

.anatomy-label{
  font-size:0.85rem;font-weight:700;text-align:center;
  letter-spacing:0.5px;margin-bottom:4px;
}
.anatomy-sub{
  font-size:0.7rem;color:var(--dim);text-align:center;
}

/* Right: Content */
.card-content{padding:32px;display:flex;flex-direction:column}

.card-head{display:flex;align-items:flex-start;gap:14px;margin-bottom:20px}
.card-icon{
  width:48px;height:48px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.4rem;flex-shrink:0;
}
.card-titlebox h3{font-size:1.15rem;font-weight:700;margin-bottom:3px}
.card-titlebox .en{font-size:0.72rem;color:var(--dim);font-weight:500}

/* Severity meter */
.severity{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.sev-label{font-size:0.7rem;color:var(--dim);width:50px}
.sev-track{flex:1;height:6px;background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden}
.sev-fill{height:100%;border-radius:3px;transition:width 1.5s cubic-bezier(0.16,1,0.3,1)}
.sev-text{font-size:0.7rem;font-weight:700;min-width:36px;text-align:right}

/* Description */
.card-desc{
  font-size:0.85rem;color:var(--dim);line-height:1.7;
  margin-bottom:18px;flex:1;
}
.card-desc strong{color:var(--text)}

/* Physiology detail blocks */
.physio-blocks{display:flex;flex-direction:column;gap:10px;margin-bottom:18px}
.physio-block{
  display:flex;gap:12px;
  padding:12px 14px;border-radius:12px;
  background:rgba(255,255,255,0.02);
  border:1px solid rgba(255,255,255,0.04);
}
.pb-icon{font-size:1.1rem;flex-shrink:0;margin-top:1px}
.pb-text{font-size:0.78rem;color:var(--dim);line-height:1.6}
.pb-text strong{color:var(--text);font-weight:600}

/* Acoustic signature */
.acoustic{
  padding:14px;border-radius:12px;
  background:rgba(0,229,255,0.03);border:1px solid rgba(0,229,255,0.08);
}
.acoustic-title{
  font-size:0.68rem;color:var(--cyan);font-weight:700;
  letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;
}
.acoustic-features{display:flex;flex-wrap:wrap;gap:6px}
.af-tag{
  font-size:0.68rem;padding:4px 10px;border-radius:8px;
  background:rgba(0,229,255,0.06);color:rgba(0,229,255,0.8);
  border:1px solid rgba(0,229,255,0.1);
  font-variant-numeric:tabular-nums;
}

/* ===== COLOR THEMES ===== */
.problem-card[data-cat="glottis"] .card-anatomy::before{background:linear-gradient(135deg,var(--red),var(--pink))}
.problem-card[data-cat="glottis"] .card-icon{background:rgba(255,59,92,0.1)}
.problem-card[data-cat="glottis"] .sev-fill{background:linear-gradient(90deg,var(--green),var(--red))}
.problem-card[data-cat="glottis"] .sev-text{color:var(--red)}

.problem-card[data-cat="tract"] .card-anatomy::before{background:linear-gradient(135deg,var(--purple),var(--cyan))}
.problem-card[data-cat="tract"] .card-icon{background:rgba(180,74,255,0.1)}
.problem-card[data-cat="tract"] .sev-fill{background:linear-gradient(90deg,var(--cyan),var(--purple))}
.problem-card[data-cat="tract"] .sev-text{color:var(--purple)}

.problem-card[data-cat="breath"] .card-anatomy::before{background:linear-gradient(135deg,var(--green),var(--cyan))}
.problem-card[data-cat="breath"] .card-icon{background:rgba(0,255,136,0.1)}
.problem-card[data-cat="breath"] .sev-fill{background:linear-gradient(90deg,var(--yellow),var(--green))}
.problem-card[data-cat="breath"] .sev-text{color:var(--green)}

.problem-card[data-cat="register"] .card-anatomy::before{background:linear-gradient(135deg,var(--orange),var(--yellow))}
.problem-card[data-cat="register"] .card-icon{background:rgba(255,138,61,0.1)}
.problem-card[data-cat="register"] .sev-fill{background:linear-gradient(90deg,var(--yellow),var(--orange))}
.problem-card[data-cat="register"] .sev-text{color:var(--orange)}

.problem-card[data-cat="mix"] .card-anatomy::before{background:linear-gradient(135deg,var(--purple),var(--pink))}
.problem-card[data-cat="mix"] .card-icon{background:rgba(180,74,255,0.1)}
.problem-card[data-cat="mix"] .sev-fill{background:linear-gradient(90deg,var(--pink),var(--purple))}
.problem-card[data-cat="mix"] .sev-text{color:var(--purple)}

/* ===== RESPONSIVE ===== */
@media(max-width:800px){
  .problem-card{grid-template-columns:1fr}
  .card-anatomy{border-right:none;border-bottom:1px solid var(--border);padding:24px}
  .anatomy-visual{width:140px;height:140px}
}
@media(max-width:520px){
  .hero h1{font-size:2rem}
  .cat-btn{font-size:0.7rem;padding:6px 12px}
  .card-content{padding:20px}
}
</style>
</head>
<body>

<div class="aurora"></div>

<div class="container">

  <!-- ===== HERO ===== -->
  <section class="hero">
    <div class="hero-tag">🔬 Vocal Physiology × Acoustics</div>
    <h1>声乐问题<br>生理机理图鉴</h1>
    <p>每一个声乐问题背后，都有精确的生理学解释。理解你的喉头、声带、共鸣腔发生了什么，才能真正解决问题。</p>
  </section>

  <!-- ===== CATEGORY NAV ===== -->
  <nav class="cat-nav">

  <!-- ===== PROBLEM CARDS ===== -->

</div>

    ],
    acoustic: ['起始Peak尖锐', 'Rise Time < 5ms', '低频瞬态 ↑', 'Jitter 起始段 ↑', '能量突变'],

// ===== RENDER CARDS =====
function renderCards(filter = 'all') {
  const grid = document.getElementById('problemsGrid');
  grid.innerHTML = '';
  
  const filtered = filter === 'all' ? PROBLEMS : PROBLEMS.filter(p => p.cat === filter);
  
  filtered.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'problem-card';
    card.dataset.cat = p.cat;
    card.style.opacity = '0';
    card.style.transform = 'translateY(20px)';
    
    card.innerHTML = `
      <div class="card-anatomy">
        <div class="anatomy-visual">${ANATOMY_SVGS[p.anatomy] || ''}</div>
        <div class="anatomy-label">${p.name.split('·')[0].trim()}</div>
        <div class="anatomy-sub">${p.en.split('/')[0].trim()}</div>
      </div>
      <div class="card-content">
        <div class="card-head">
          <div class="card-icon">${p.icon}</div>
          <div class="card-titlebox">
            <h3>${p.name}</h3>
            <div class="en">${p.en}</div>
          </div>
        </div>
        <div class="severity">
          <span class="sev-label">严重度</span>
          <div class="sev-track"><div class="sev-fill" data-width="${p.severity}" style="width:0%"></div></div>
          <span class="sev-text">${p.sevLabel}</span>
        </div>
        <div class="card-desc">${p.desc}</div>
        <div class="physio-blocks">
          ${p.physio.map(b => `
            <div class="physio-block">
              <div class="pb-icon">${b.icon}</div>
              <div class="pb-text">${b.text}</div>
            </div>
          `).join('')}
        </div>
        <div class="acoustic">
          <div class="acoustic-title">🎛️ Acoustic Signature</div>
          <div class="acoustic-features">
            ${p.acoustic.map(a => `<span class="af-tag">${a}</span>`).join('')}
          </div>
        </div>
      </div>
    `;
    
    grid.appendChild(card);
    
    // Animate in
    setTimeout(() => {
      card.style.transition = 'all 0.6s cubic-bezier(0.16,1,0.3,1)';
      card.style.opacity = '1';
      card.style.transform = 'translateY(0)';
    }, i * 120);
    
    // Animate severity bar on scroll
    const observer = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if(e.isIntersecting) {
          const fill = e.target.querySelector('.sev-fill');
          if(fill) {
            fill.style.transition = 'width 1.2s cubic-bezier(0.16,1,0.3,1)';
            fill.style.width = fill.dataset.width + '%';
          }
          observer.unobserve(e.target);
        }
      });
    }, {threshold: 0.2});
    observer.observe(card);
  });
}

// ===== CATEGORY FILTER =====
document.querySelectorAll('.cat-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderCards(btn.dataset.filter);
  });
});

// ===== INIT =====
renderCards();
</script>
