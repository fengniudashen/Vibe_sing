<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>声乐问题 × 练声方案 — Vibesing 高音觉醒</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#06060c;--card:rgba(255,255,255,0.025);
  --glass:rgba(255,255,255,0.035);--border:rgba(255,255,255,0.06);
  --cyan:#00e5ff;--pink:#ff2d78;--purple:#b44aff;
  --green:#00ff88;--yellow:#ffd700;--orange:#ff8a3d;--red:#ff3b5c;
  --text:#e4e4f0;--dim:#5e5e74;
}
html{font-size:16px;scroll-behavior:smooth}
body{
  font-family:'SF Pro Display',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg);color:var(--text);overflow-x:hidden;
}

/* BG */
.aurora{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 80% 50% at 15% 25%,rgba(0,229,255,0.06),transparent),
    radial-gradient(ellipse 60% 60% at 85% 75%,rgba(180,74,255,0.05),transparent),
    radial-gradient(ellipse 70% 40% at 50% 50%,rgba(0,255,136,0.03),transparent);
  animation:hue 18s ease-in-out infinite alternate;
}
@keyframes hue{0%{filter:hue-rotate(0)}100%{filter:hue-rotate(15deg)}}

.container{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:0 20px}

/* HERO */
.hero{padding:90px 0 50px;text-align:center}
.hero-tag{
  display:inline-block;padding:6px 18px;border-radius:50px;
  font-size:0.72rem;letter-spacing:2px;text-transform:uppercase;
  border:1px solid rgba(0,255,136,0.2);color:var(--green);
  background:rgba(0,255,136,0.06);margin-bottom:24px;
}
.hero h1{
  font-size:clamp(2.2rem,5.5vw,4rem);font-weight:800;line-height:1.15;
  margin-bottom:16px;
  background:linear-gradient(135deg,#fff 15%,var(--green) 55%,var(--cyan) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.hero p{max-width:620px;margin:0 auto;color:var(--dim);font-size:1.02rem;line-height:1.7}

/* LEVEL SELECTOR */
.level-bar{
  display:flex;justify-content:center;gap:8px;flex-wrap:wrap;
  padding:20px 0 40px;position:sticky;top:0;z-index:50;
  background:linear-gradient(180deg,var(--bg) 60%,transparent);
}
.lvl-btn{
  padding:8px 18px;border:1px solid var(--border);border-radius:50px;
  background:var(--glass);color:var(--dim);font-size:0.78rem;font-weight:600;
  cursor:pointer;transition:all 0.3s;letter-spacing:0.5px;
}
.lvl-btn:hover,.lvl-btn.active{
  border-color:var(--green);color:var(--green);
  background:rgba(0,255,136,0.08);box-shadow:0 0 16px rgba(0,255,136,0.1);
}

/* PROBLEM-EXERCISE CARDS */
.cards{display:flex;flex-direction:column;gap:28px;padding-bottom:80px}

.pe-card{
  display:grid;grid-template-columns:1fr 1fr;
  background:var(--card);border:1px solid var(--border);border-radius:24px;
  overflow:hidden;transition:all 0.4s cubic-bezier(0.16,1,0.3,1);
  position:relative;
}
.pe-card:hover{
  transform:translateY(-4px);border-color:rgba(255,255,255,0.1);
  box-shadow:0 20px 60px rgba(0,0,0,0.4);
}
.pe-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.06),transparent);
}

/* LEFT: Problem */
.pe-problem{
  padding:32px;border-right:1px solid var(--border);
  display:flex;flex-direction:column;
}
.pe-badge{
  display:inline-flex;align-items:center;gap:6px;
  padding:4px 12px;border-radius:20px;font-size:0.65rem;font-weight:700;
  letter-spacing:0.5px;width:fit-content;margin-bottom:16px;
}
.pe-badge.red{background:rgba(255,59,92,0.1);color:var(--red);border:1px solid rgba(255,59,92,0.15)}
.pe-badge.orange{background:rgba(255,138,61,0.1);color:var(--orange);border:1px solid rgba(255,138,61,0.15)}
.pe-badge.yellow{background:rgba(255,215,0,0.1);color:var(--yellow);border:1px solid rgba(255,215,0,0.15)}
.pe-badge.purple{background:rgba(180,74,255,0.1);color:var(--purple);border:1px solid rgba(180,74,255,0.15)}

.pe-title{font-size:1.25rem;font-weight:800;margin-bottom:6px}
.pe-en{font-size:0.72rem;color:var(--dim);margin-bottom:16px}
.pe-desc{font-size:0.82rem;color:var(--dim);line-height:1.7;margin-bottom:18px;flex:1}
.pe-desc strong{color:var(--text)}

/* Symptoms */
.symptoms{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.symptom{
  font-size:0.68rem;padding:4px 10px;border-radius:8px;
  background:rgba(255,59,92,0.06);color:rgba(255,59,92,0.7);
  border:1px solid rgba(255,59,92,0.1);
}
.pe-card[data-color="orange"] .symptom{background:rgba(255,138,61,0.06);color:rgba(255,138,61,0.7);border-color:rgba(255,138,61,0.1)}
.pe-card[data-color="yellow"] .symptom{background:rgba(255,215,0,0.06);color:rgba(255,215,0,0.7);border-color:rgba(255,215,0,0.1)}
.pe-card[data-color="purple"] .symptom{background:rgba(180,74,255,0.06);color:rgba(180,74,255,0.7);border-color:rgba(180,74,255,0.1)}

/* Danger meter */
.danger-row{display:flex;align-items:center;gap:8px}
.danger-label{font-size:0.68rem;color:var(--dim)}
.danger-dots{display:flex;gap:3px}
.danger-dot{
  width:8px;height:8px;border-radius:50%;
  background:rgba(255,255,255,0.06);transition:all 0.5s;
}
.danger-dot.on{box-shadow:0 0 6px currentColor}

/* RIGHT: Exercise */
.pe-exercise{
  padding:32px;display:flex;flex-direction:column;
  background:rgba(0,255,136,0.01);
}
.ex-header{
  display:flex;align-items:center;gap:10px;margin-bottom:18px;
}
.ex-icon{
  width:38px;height:38px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.1rem;background:rgba(0,255,136,0.08);flex-shrink:0;
}
.ex-header-text h4{font-size:0.95rem;font-weight:700;color:var(--green)}
.ex-header-text span{font-size:0.68rem;color:var(--dim)}

/* Exercise steps */
.ex-steps{display:flex;flex-direction:column;gap:12px;margin-bottom:18px;flex:1}
.ex-step{
  display:flex;gap:12px;padding:14px;border-radius:14px;
  background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.04);
  transition:all 0.3s;cursor:default;
}
.ex-step:hover{
  background:rgba(0,255,136,0.03);border-color:rgba(0,255,136,0.1);
  transform:translateX(4px);
}
.step-num{
  width:28px;height:28px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:0.75rem;font-weight:800;flex-shrink:0;
  background:rgba(0,255,136,0.1);color:var(--green);
}
.step-content{flex:1}
.step-title{font-size:0.82rem;font-weight:700;margin-bottom:3px}
.step-desc{font-size:0.72rem;color:var(--dim);line-height:1.5}
.step-detail{
  font-size:0.68rem;color:rgba(0,229,255,0.6);margin-top:4px;
  font-style:italic;
}

/* Timer / difficulty */
.ex-meta{
  display:flex;gap:16px;flex-wrap:wrap;
  padding-top:12px;border-top:1px solid var(--border);
}
.meta-item{
  display:flex;align-items:center;gap:6px;font-size:0.7rem;color:var(--dim);
}
.meta-icon{font-size:0.9rem}

/* Difficulty stars */
.diff-stars{display:flex;gap:2px}
.diff-star{width:10px;height:10px;border-radius:2px}
.diff-star.on{background:var(--yellow);box-shadow:0 0 4px rgba(255,215,0,0.4)}
.diff-star.off{background:rgba(255,255,255,0.06)}

/* Progress ring */
.progress-ring{
  margin-top:14px;display:flex;align-items:center;gap:12px;
  padding:10px 14px;border-radius:12px;
  background:rgba(0,255,136,0.04);border:1px solid rgba(0,255,136,0.1);
}
.ring-svg{width:36px;height:36px;transform:rotate(-90deg);flex-shrink:0}
.ring-bg{fill:none;stroke:rgba(255,255,255,0.06);stroke-width:4}
.ring-fill{
  fill:none;stroke:var(--green);stroke-width:4;stroke-linecap:round;
  stroke-dasharray:100;stroke-dashoffset:100;
  transition:stroke-dashoffset 2s cubic-bezier(0.16,1,0.3,1);
}
.ring-text{font-size:0.72rem;color:var(--dim)}
.ring-text strong{color:var(--green);font-weight:700}

/* Responsive */
@media(max-width:800px){
  .pe-card{grid-template-columns:1fr}
  .pe-problem{border-right:none;border-bottom:1px solid var(--border)}
}
@media(max-width:520px){
  .hero h1{font-size:2rem}
  .pe-problem,.pe-exercise{padding:20px}
}
</style>
</head>
<body>

<div class="aurora"></div>

<div class="container">

  <section class="hero">
    <div class="hero-tag">🏋️ Vocal Training Prescription</div>
    <h1>声乐问题<br>练声处方</h1>
    <p>每个问题都有对应的练声方案。精准诊断，精准训练。像医生开处方一样，给你的嗓子开最合适的练声药方。</p>
  </section>

  <nav class="level-bar">
    <button class="lvl-btn active" data-level="all">全部</button>
    <button class="lvl-btn" data-level="beginner">🌱 入门级</button>
    <button class="lvl-btn" data-level="intermediate">⚡ 进阶级</button>
    <button class="lvl-btn" data-level="advanced">🔥 高阶级</button>

  <div class="cards" id="cardsContainer"></div>

</div>

function renderCards(level='all'){
  const box = document.getElementById('cardsContainer');
  box.innerHTML = '';
  const filtered = level === 'all' ? DATA : DATA.filter(d => d.level === level);

  filtered.forEach((d, i) => {
    const card = document.createElement('div');
    card.className = 'pe-card';
    card.dataset.color = d.color;
    card.style.opacity = '0';
    card.style.transform = 'translateY(24px)';

    // Danger dots
    const dots = Array.from({length:5}, (_,j) => {
      const on = j < d.danger;
      const colors = {red:'var(--red)',orange:'var(--orange)',yellow:'var(--yellow)',purple:'var(--purple)'};
      return `<div class="danger-dot ${on?'on':''}" style="${on?`background:${colors[d.color]};`:''}"></div>`;
    }).join('');

    // Difficulty stars
    const stars = Array.from({length:5}, (_,j) =>
      `<div class="diff-star ${j<d.difficulty?'on':'off'}"></div>`
    ).join('');

    // Progress ring offset
    const circumference = 2 * Math.PI * 15; // r=15
    const offset = circumference * (1 - d.progress / 100);

    card.innerHTML = `
      <div class="pe-problem">
        <div class="pe-badge ${d.badgeClass}">${d.badge}</div>
        <div class="pe-title">${d.title}</div>
        <div class="pe-en">${d.en}</div>
        <div class="pe-desc">${d.desc}</div>
        <div class="symptoms">${d.symptoms.map(s=>`<span class="symptom">${s}</span>`).join('')}</div>
        <div class="danger-row">
          <span class="danger-label">危险度</span>
          <div class="danger-dots">${dots}</div>
        </div>
      </div>
      <div class="pe-exercise">
        <div class="ex-header">
          <div class="ex-icon">${d.exIcon}</div>
          <div class="ex-header-text">
            <h4>${d.exTitle}</h4>
            <span>${d.exSub}</span>
          </div>
        </div>
        <div class="ex-steps">
          ${d.steps.map((s,j) => `
            <div class="ex-step">
              <div class="step-num">${j+1}</div>
              <div class="step-content">
                <div class="step-title">${s.title}</div>
                <div class="step-desc">${s.desc}</div>
                <div class="step-detail">${s.detail}</div>
              </div>
            </div>
          `).join('')}
        </div>
        <div class="ex-meta">
          <div class="meta-item"><span class="meta-icon">⏱️</span>${d.time}</div>
          <div class="meta-item"><span class="meta-icon">📅</span>${d.freq}</div>
          <div class="meta-item"><span class="meta-icon">⭐</span><div class="diff-stars">${stars}</div></div>
        </div>
        <div class="progress-ring">
          <svg class="ring-svg" viewBox="0 0 36 36">
            <circle class="ring-bg" cx="18" cy="18" r="15"/>
            <circle class="ring-fill" cx="18" cy="18" r="15"
              stroke-dasharray="${circumference.toFixed(1)}"
              data-offset="${offset.toFixed(1)}"
              stroke-dashoffset="${circumference.toFixed(1)}"/>
          </svg>
          <div class="ring-text">
            <strong>${d.progress}%</strong> 用户通过此训练改善<br>
            <span style="font-size:0.65rem;opacity:0.7">${d.tip}</span>
          </div>
        </div>
      </div>
    `;

    box.appendChild(card);

    // Animate in
    setTimeout(() => {
      card.style.transition = 'all 0.6s cubic-bezier(0.16,1,0.3,1)';
      card.style.opacity = '1';
      card.style.transform = 'translateY(0)';
    }, i * 100);

    // Animate progress ring on scroll
    const observer = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if(e.isIntersecting) {
          const ring = e.target.querySelector('.ring-fill');
          if(ring) ring.style.strokeDashoffset = ring.dataset.offset;
          observer.unobserve(e.target);
        }
      });
    }, {threshold:0.2});
    observer.observe(card);
  });
}

// Level filter
document.querySelectorAll('.lvl-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.lvl-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderCards(btn.dataset.level);
  });
});

renderCards();
</script>
