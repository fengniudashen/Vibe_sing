<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>练声常见错误 — Vibesing 高音觉醒</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#050509;--card:rgba(255,255,255,0.022);
  --glass:rgba(255,255,255,0.035);--border:rgba(255,255,255,0.055);
  --red:#ff3b5c;--green:#00ff88;--cyan:#00e5ff;--pink:#ff2d78;
  --purple:#b44aff;--yellow:#ffd700;--orange:#ff8a3d;
  --text:#e4e4f0;--dim:#5e5e74;
}
html{font-size:16px;scroll-behavior:smooth}
body{
  font-family:'SF Pro Display',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg);color:var(--text);overflow-x:hidden;
}
.aurora{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 80% 50% at 20% 30%,rgba(255,59,92,0.05),transparent),
    radial-gradient(ellipse 60% 60% at 80% 70%,rgba(0,229,255,0.04),transparent),
    radial-gradient(ellipse 70% 40% at 50% 50%,rgba(180,74,255,0.03),transparent);
  animation:hue 16s ease-in-out infinite alternate;
}
@keyframes hue{0%{filter:hue-rotate(0)}100%{filter:hue-rotate(12deg)}}

.container{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:0 20px}

/* HERO */
.hero{padding:90px 0 40px;text-align:center}
.hero-tag{
  display:inline-flex;align-items:center;gap:8px;
  padding:6px 18px;border-radius:50px;font-size:0.72rem;
  letter-spacing:2px;text-transform:uppercase;
  border:1px solid rgba(255,59,92,0.2);color:var(--red);
  background:rgba(255,59,92,0.06);margin-bottom:24px;
}
.hero h1{
  font-size:clamp(2.2rem,5.5vw,4rem);font-weight:800;line-height:1.15;
  margin-bottom:16px;
  background:linear-gradient(135deg,#fff 15%,var(--red) 50%,var(--orange) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.hero p{max-width:640px;margin:0 auto;color:var(--dim);font-size:1.02rem;line-height:1.7}

/* STATS */
.stats-row{
  display:flex;justify-content:center;gap:24px;flex-wrap:wrap;
  padding:30px 0 50px;
}
.stat-pill{
  display:flex;align-items:center;gap:8px;
  padding:10px 20px;border-radius:50px;
  background:var(--glass);border:1px solid var(--border);
}
.stat-num{font-size:1.4rem;font-weight:900}
.stat-num.red{color:var(--red)}
.stat-num.yellow{color:var(--yellow)}
.stat-num.green{color:var(--green)}
.stat-text{font-size:0.75rem;color:var(--dim)}

/* ERROR CARDS */
.errors-list{display:flex;flex-direction:column;gap:24px;padding-bottom:80px}

.error-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:24px;overflow:hidden;
  transition:all 0.4s cubic-bezier(0.16,1,0.3,1);
  position:relative;
}
.error-card:hover{
  transform:translateY(-3px);border-color:rgba(255,255,255,0.1);
  box-shadow:0 20px 60px rgba(0,0,0,0.35);
}

/* Card header */
.ec-header{
  display:flex;align-items:center;gap:16px;
  padding:24px 28px;cursor:pointer;
  transition:background 0.3s;
}
.ec-header:hover{background:rgba(255,255,255,0.015)}

.ec-num{
  width:48px;height:48px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.3rem;font-weight:900;flex-shrink:0;
  position:relative;
}
.ec-num::after{
  content:'';position:absolute;inset:0;border-radius:14px;
  opacity:0.15;
}
.ec-num.critical{color:var(--red);background:rgba(255,59,92,0.08)}
.ec-num.warning{color:var(--orange);background:rgba(255,138,61,0.08)}
.ec-num.caution{color:var(--yellow);background:rgba(255,215,0,0.08)}

.ec-titlebox{flex:1}
.ec-title{font-size:1.1rem;font-weight:700;margin-bottom:2px}
.ec-subtitle{font-size:0.75rem;color:var(--dim)}

.ec-severity{
  display:flex;flex-direction:column;align-items:flex-end;gap:4px;
}
.sev-badge{
  padding:4px 12px;border-radius:20px;font-size:0.65rem;
  font-weight:800;letter-spacing:0.5px;
}
.sev-badge.critical{background:rgba(255,59,92,0.1);color:var(--red);border:1px solid rgba(255,59,92,0.15)}
.sev-badge.warning{background:rgba(255,138,61,0.1);color:var(--orange);border:1px solid rgba(255,138,61,0.15)}
.sev-badge.caution{background:rgba(255,215,0,0.1);color:var(--yellow);border:1px solid rgba(255,215,0,0.15)}
.sev-pct{font-size:0.68rem;color:var(--dim)}

.ec-toggle{
  width:32px;height:32px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,0.04);flex-shrink:0;
  transition:all 0.3s;font-size:0.8rem;color:var(--dim);
}
.ec-toggle.open{transform:rotate(180deg);color:var(--cyan)}

/* Card body (expandable) */
.ec-body{
  max-height:0;overflow:hidden;
  transition:max-height 0.5s cubic-bezier(0.16,1,0.3,1);
}
.ec-body.open{max-height:1200px}

.ec-content{
  padding:0 28px 28px;
  display:grid;grid-template-columns:1fr 1fr;gap:20px;
}

/* Wrong side */
.wrong-side,.right-side{
  padding:20px;border-radius:16px;
}
.wrong-side{
  background:rgba(255,59,92,0.03);border:1px solid rgba(255,59,92,0.08);
}
.right-side{
  background:rgba(0,255,136,0.03);border:1px solid rgba(0,255,136,0.08);
}

.side-header{
  display:flex;align-items:center;gap:8px;margin-bottom:14px;
}
.side-icon{font-size:1.2rem}
.side-label{
  font-size:0.72rem;font-weight:800;letter-spacing:1px;text-transform:uppercase;
}
.wrong-side .side-label{color:var(--red)}
.right-side .side-label{color:var(--green)}

.side-content{display:flex;flex-direction:column;gap:10px}

.side-item{
  display:flex;gap:10px;font-size:0.8rem;line-height:1.6;
  padding:10px 12px;border-radius:10px;transition:background 0.3s;
}
.wrong-side .side-item{background:rgba(255,59,92,0.03)}
.wrong-side .side-item:hover{background:rgba(255,59,92,0.06)}
.right-side .side-item{background:rgba(0,255,136,0.03)}
.right-side .side-item:hover{background:rgba(0,255,136,0.06)}
.item-icon{font-size:1rem;flex-shrink:0;margin-top:1px}
.item-text{color:var(--dim)}
.item-text strong{color:var(--text);font-weight:600}

/* Consequence bar */
.consequence{
  grid-column:1/-1;
  display:flex;align-items:center;gap:12px;
  padding:14px 18px;border-radius:12px;
  background:rgba(255,215,0,0.03);border:1px solid rgba(255,215,0,0.08);
}
.consequence-icon{font-size:1.3rem;flex-shrink:0}
.consequence-text{font-size:0.78rem;color:var(--dim);line-height:1.5}
.consequence-text strong{color:var(--yellow)}

/* Vibesing detection */
.detection{
  grid-column:1/-1;
  display:flex;align-items:center;gap:12px;
  padding:14px 18px;border-radius:12px;
  background:rgba(0,229,255,0.03);border:1px solid rgba(0,229,255,0.08);
}
.detection-icon{font-size:1.3rem;flex-shrink:0}
.detection-text{font-size:0.78rem;color:var(--dim);line-height:1.5}
.detection-text strong{color:var(--cyan)}

/* Responsive */
@media(max-width:700px){
  .ec-content{grid-template-columns:1fr}
  .consequence,.detection{grid-column:1}
  .stats-row{gap:10px}
  .stat-pill{padding:8px 14px}
}
</style>
</head>

function renderAll(){
  const list = document.getElementById('errorsList');
  MISTAKES.forEach((m,i)=>{
    const card = document.createElement('div');
    card.className='error-card';
    card.style.opacity='0';card.style.transform='translateY(16px)';

    card.innerHTML=`
      <div class="ec-header" onclick="toggleCard(this)">
        <div class="ec-num ${m.severity}">${m.num}</div>
        <div class="ec-titlebox">
          <div class="ec-title">${m.title}</div>
          <div class="ec-subtitle">${m.sub}</div>
        </div>
        <div class="ec-severity">
          <div class="sev-badge ${m.severity}">${m.sevText}</div>
          <div class="sev-pct">${m.pct}</div>
        </div>
        <div class="ec-toggle">▼</div>
      </div>
      <div class="ec-body">
        <div class="ec-content">
          <div class="wrong-side">
            <div class="side-header">
              <span class="side-icon">❌</span>
              <span class="side-label">错误做法</span>
            </div>
            <div class="side-content">
              ${m.wrong.map(w=>`<div class="side-item"><span class="item-icon">${w.icon}</span><span class="item-text">${w.text}</span></div>`).join('')}
            </div>
          </div>
          <div class="right-side">
            <div class="side-header">
              <span class="side-icon">✅</span>
              <span class="side-label">正确做法</span>
            </div>
            <div class="side-content">
              ${m.right.map(r=>`<div class="side-item"><span class="item-icon">${r.icon}</span><span class="item-text">${r.text}</span></div>`).join('')}
            </div>
          </div>
          <div class="consequence">
            <div class="consequence-icon">⚠️</div>
            <div class="consequence-text">${m.consequence}</div>
          </div>
          <div class="detection">
            <div class="detection-icon">🤖</div>
            <div class="detection-text">${m.detection}</div>
          </div>
        </div>
      </div>
    `;

    list.appendChild(card);

    setTimeout(()=>{
      card.style.transition='all 0.5s cubic-bezier(0.16,1,0.3,1)';
      card.style.opacity='1';card.style.transform='translateY(0)';
    },i*80);
  });

  // Auto-expand first card
  setTimeout(()=>{
    const first = list.querySelector('.ec-header');
    if(first) toggleCard(first);
  },500);
}

function toggleCard(header){
  const body = header.nextElementSibling;
  const toggle = header.querySelector('.ec-toggle');
  const isOpen = body.classList.contains('open');

  // Close all
  document.querySelectorAll('.ec-body.open').forEach(b=>{
    b.classList.remove('open');
    b.previousElementSibling.querySelector('.ec-toggle').classList.remove('open');
  });

  if(!isOpen){
    body.classList.add('open');
    toggle.classList.add('open');
  }
}

renderAll();
</script>
